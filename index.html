<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="J.A.R.V.I.S — Personal AI Dashboard & Assistant">
  <title>J.A.R.V.I.S</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <div class="jarvis-dashboard">
      <div class="jarvis-card jarvis-greeting-card" id="greeting-widget">
        <div id="arc-reactor-container">
          <div class="arc-reactor">
            <div class="core"></div>
            <div class="ring inner"></div>
            <div class="ring outer"></div>
          </div>
        </div>
        <div id="greeting-content"></div>
      </div>
      <div class="jarvis-card" id="clock-widget"></div>
      <div class="jarvis-card" id="weather-widget"></div>
      <div class="jarvis-card" id="stats-widget"></div>
      <div class="jarvis-card" id="music-widget"></div>
      <div class="jarvis-card" id="tasks-widget"></div>
      <div class="jarvis-card" id="notes-widget"></div>
      <div class="jarvis-card" id="latency-widget"></div>
      <div class="jarvis-card" id="deployment-widget"></div>
      <div class="jarvis-card jarvis-command-card" id="command-widget"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
